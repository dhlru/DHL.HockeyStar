<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ДХЛ - Скоро</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a0a0a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .image-wrapper {
            margin-bottom: 24px;
        }
        .image-wrapper img {
            max-width: 100%;
            border-radius: 28px;
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.4);
            display: block;
            margin: 0 auto;
        }
        h1 {
            color: #ff0033;
            font-size: 2rem;
            margin-bottom: 12px;
            text-shadow: 0 0 12px rgba(255, 0, 51, 0.5);
            letter-spacing: 1px;
        }
        .date {
            color: #0066ff;
            font-size: 1.1rem;
            font-weight: bold;
            margin: 12px 0 16px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }
        .timer-container {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 32px;
            padding: 18px 12px;
            margin: 20px 0;
            border: 1px solid rgba(255, 0, 51, 0.35);
            backdrop-filter: blur(4px);
        }
        .timer-title {
            color: #ffaa44;
            font-size: 0.75rem;
            letter-spacing: 2.5px;
            margin-bottom: 14px;
            font-weight: 600;
        }
        .timer {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .timer-block {
            text-align: center;
            min-width: 68px;
        }
        .timer-number {
            font-size: 2rem;
            font-weight: 800;
            color: #ff0033;
            background: #0a0a0a;
            padding: 8px 6px;
            border-radius: 18px;
            display: inline-block;
            min-width: 68px;
            font-family: monospace;
            border: 1px solid #ff0033;
            box-shadow: 0 0 6px rgba(255,0,51,0.3);
            letter-spacing: 2px;
        }
        .timer-label {
            color: #bbb;
            font-size: 0.65rem;
            margin-top: 6px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .update-list {
            text-align: left;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 18px 22px;
            margin: 24px 0 16px;
            backdrop-filter: blur(2px);
        }
        .update-list strong {
            color: #ffaa44;
            display: block;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .update-list li {
            color: #ddd;
            margin: 10px 0;
            margin-left: 20px;
            line-height: 1.4;
        }
        .footer {
            color: #666;
            font-size: 0.7rem;
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ФОТО (рабочая ссылка) -->
    <div class="image-wrapper">
        <img src="https://i.ibb.co/fzj5LsCj/IMG-20260414-200723.jpg" alt="ДХЛ обновление">
    </div>

    <h1>⚡ ОБНОВЛЕНИЕ ⚡</h1>
    <div class="date">🗓️ 15 АПРЕЛЯ 2026 | 17:15</div>

    <div class="timer-container">
        <div class="timer-title">⏰ ДО ОБНОВЛЕНИЯ ОСТАЛОСЬ ⏰</div>
        <div class="timer">
            <div class="timer-block">
                <div class="timer-number" id="days">00</div>
                <div class="timer-label">Дней</div>
            </div>
            <div class="timer-block">
                <div class="timer-number" id="hours">00</div>
                <div class="timer-label">Часов</div>
            </div>
            <div class="timer-block">
                <div class="timer-number" id="minutes">00</div>
                <div class="timer-label">Минут</div>
            </div>
            <div class="timer-block">
                <div class="timer-number" id="seconds">00</div>
                <div class="timer-label">Секунд</div>
            </div>
        </div>
    </div>

    <div class="footer">ДХЛ • Дворовая Хоккейная Лига</div>
</div>

<script>
    (function() {
        // ДАТА: 15 апреля 2026, 17:15 (месяц 3 = апрель)
        var releaseDate = new Date(2026, 3, 15, 17, 15, 0);
        
        function updateTimer() {
            var now = new Date();
            var diff = releaseDate.getTime() - now.getTime();
            
            var daysEl = document.getElementById('days');
            var hoursEl = document.getElementById('hours');
            var minutesEl = document.getElementById('minutes');
            var secondsEl = document.getElementById('seconds');
            var timerTitle = document.querySelector('.timer-title');
            
            if (!daysEl || !hoursEl || !minutesEl || !secondsEl) return;
            
            // Если время вышло
            if (diff <= 0) {
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';
                if (timerTitle) timerTitle.innerHTML = '🎉 ОБНОВЛЕНИЕ УЖЕ ДОСТУПНО! 🎉';
                return;
            }
            
            var days = Math.floor(diff / (1000 * 60 * 60 * 24));
            var hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));
            var minutes = Math.floor((diff % (3600000)) / (1000 * 60));
            var seconds = Math.floor((diff % (60000)) / 1000);
            
            daysEl.textContent = days < 10 ? '0' + days : '' + days;
            hoursEl.textContent = hours < 10 ? '0' + hours : '' + hours;
            minutesEl.textContent = minutes < 10 ? '0' + minutes : '' + minutes;
            secondsEl.textContent = seconds < 10 ? '0' + seconds : '' + seconds;
        }
        
        updateTimer();
        setInterval(updateTimer, 1000);
    })();
</script>
</body>
</html>
